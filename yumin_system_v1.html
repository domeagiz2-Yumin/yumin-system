<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yumin System v1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow: hidden; }
        body {
            background: #020812; color: #f9a8d4;
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            width: 100vw; min-height: 100vh; min-height: 100dvh; overflow: hidden;
        }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .main-frame {
            position: relative; z-index: 1;
            width: 100vw; max-width: 400px;
            height: 100vh; height: 100dvh; max-height: 700px;
            background: rgba(2, 8, 20, 0.88);
            border: 1px solid rgba(244, 114, 182, 0.35);
            border-radius: 14px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 40px rgba(244,114,182,0.1), 0 0 80px rgba(244,114,182,0.04), inset 0 0 40px rgba(244,114,182,0.02);
        }
        @keyframes cornerPulse{0%,100%{border-color:rgba(244,114,182,0.55);filter:drop-shadow(0 0 0px rgba(244,114,182,0));}50%{border-color:rgba(244,114,182,1);filter:drop-shadow(0 0 5px rgba(244,114,182,0.7));}}
        .corner { position: absolute; width: 18px; height: 18px; border-color: rgba(244,114,182,0.7); border-style: solid; z-index: 10; animation:cornerPulse 3s ease-in-out infinite; }
        .c-tl{top:8px;left:8px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
        .c-tr{top:8px;right:8px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
        .c-bl{bottom:8px;left:8px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
        .c-br{bottom:8px;right:8px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
        .scanline {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(244,114,182,0.012) 3px,rgba(244,114,182,0.012) 4px);
            pointer-events: none; z-index: 9; border-radius: 14px;
        }

        /* HEADER */
        .header {
            position: relative; z-index: 20;
            padding: 14px 16px 10px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(244,114,182,0.15); flex-shrink: 0;
        }
        .header-left { display: flex; flex-direction: column; gap: 2px; }
        @keyframes titleGlow{0%,100%{color:#fbcfe8;text-shadow:0 0 12px rgba(244,114,182,0.9),0 0 24px rgba(244,114,182,0.4);}50%{color:#fff;text-shadow:0 0 20px rgba(244,114,182,1),0 0 40px rgba(244,114,182,0.7),0 0 70px rgba(244,114,182,0.3);}}
        .sys-title {
            font-size: 27px; font-weight: bold; letter-spacing: 4px; color: #fbcfe8;
            text-shadow: 0 0 12px rgba(244,114,182,0.9), 0 0 24px rgba(244,114,182,0.4);
            animation: titleGlow 3.5s ease-in-out infinite;
            position: relative; cursor: default;
        }
        .sys-title::before, .sys-title::after {
            content: attr(data-text); position: absolute;
            top: 0; left: 0; opacity: 0; pointer-events: none;
            font-size: inherit; font-weight: inherit; letter-spacing: inherit;
        }
        .sys-title.glitching::before {
            opacity: 1; color: rgba(255,50,80,0.9);
            text-shadow: -3px 0 rgba(255,50,80,0.5);
            animation: glitchA 0.09s steps(1) infinite;
        }
        .sys-title.glitching::after {
            opacity: 1; color: rgba(50,140,255,0.9);
            text-shadow: 3px 0 rgba(50,140,255,0.5);
            animation: glitchB 0.09s steps(1) infinite;
        }
        @keyframes glitchA {
            0%  { clip-path:polygon(0 8%,100% 8%,100% 30%,0 30%);  transform:translate(3px,0); }
            25% { clip-path:polygon(0 54%,100% 54%,100% 72%,0 72%); transform:translate(-3px,0); }
            50% { clip-path:polygon(0 3%,100% 3%,100% 18%,0 18%);  transform:translate(4px,0); }
            75% { clip-path:polygon(0 74%,100% 74%,100% 93%,0 93%); transform:translate(-2px,0); }
        }
        @keyframes glitchB {
            0%  { clip-path:polygon(0 62%,100% 62%,100% 82%,0 82%); transform:translate(-4px,0); }
            25% { clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%); transform:translate(3px,0); }
            50% { clip-path:polygon(0 80%,100% 80%,100% 97%,0 97%); transform:translate(-3px,0); }
            75% { clip-path:polygon(0 35%,100% 35%,100% 52%,0 52%); transform:translate(4px,0); }
        }
        .sys-sub { font-size: 12px; color: rgba(244,114,182,0.72); letter-spacing: 2.5px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .model-label {
            background: rgba(244,114,182,0.07); border: 1px solid rgba(244,114,182,0.28);
            color: #f9a8d4; font-family: 'Courier New',monospace;
            font-size: 11px; padding: 7px 9px; border-radius: 5px; letter-spacing: 1px;
        }
        .nav-btn {
            width: 42px; height: 42px; border: 1px solid rgba(244,114,182,0.35);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #f9a8d4; font-size: 20px; transition: all 0.2s; background: transparent;
        }
        .nav-btn:hover { background: rgba(244,114,182,0.12); box-shadow: 0 0 10px rgba(244,114,182,0.25); }

        /* STATUS */
        .status-bar {
            position: relative; z-index: 2; padding: 5px 16px;
            display: flex; align-items: center; gap: 7px;
            border-bottom: 1px solid rgba(244,114,182,0.08); flex-shrink: 0;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #f472b6; box-shadow: 0 0 7px #f472b6;
            position: relative; flex-shrink: 0;
        }
        .status-dot::after {
            content:''; position:absolute; inset:-4px; border-radius:50%;
            border:2px solid rgba(244,114,182,0.55);
            animation:ripple 2s ease-out infinite;
        }
        @keyframes ripple{0%{transform:scale(0.5);opacity:0.9}100%{transform:scale(2.6);opacity:0}}
        @keyframes statusGlow{0%,100%{opacity:0.72;text-shadow:none}50%{opacity:1;text-shadow:0 0 10px rgba(244,114,182,0.6)}}
        .status-text { font-size: 13px; color: rgba(244,114,182,0.72); letter-spacing: 1.5px; animation: statusGlow 3s ease-in-out infinite; }

        /* CHAT */
        .chat-wrap { flex: 1; position: relative; overflow: hidden; }
        .chat-area {
            position: relative; z-index: 2; height: 100%; overflow-y: auto;
            padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar{width:7px}
        .chat-area::-webkit-scrollbar-thumb{background:rgba(244,114,182,0.55);border-radius:4px}

        /* SLEEP OVERLAY */
        .sleep-overlay {
            position: absolute; inset: 0; z-index: 30;
            background: rgba(2,8,20,0.97);
            display: none;
        }
        .sleep-overlay.show { display: block; }
        .sleep-yumin-wrap {
            position: absolute; top: 0; left: 0;
            will-change: transform;
        }
        /* ZzZ animation */
        .zzz-wrap {
            position: absolute; top: 4px; right: 18px;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }
        /* ZzZ บน avatar หลัก (pre-sleep) */
        .av-zzz-wrap {
            position: absolute; top: 0px; right: 12px;
            display: none; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 10;
        }
        .av-zzz-wrap.show { display: flex; }
        .zzz-z {
            font-family: 'Courier New', monospace; font-weight: bold;
            color: #f9a8d4; text-shadow: 0 0 8px rgba(244,114,182,0.7);
            opacity: 0; animation: floatZ 3s ease-in-out infinite;
            line-height: 1;
        }
        .zzz-z.z1 { font-size: 10px; animation-delay: 0s; }
        .zzz-z.z2 { font-size: 14px; animation-delay: 1s; }
        .zzz-z.z3 { font-size: 19px; animation-delay: 2s; }
        @keyframes floatZ {
            0%   { opacity: 0; transform: translateY(0); }
            15%  { opacity: 0.9; }
            85%  { opacity: 0.7; }
            100% { opacity: 0; transform: translateY(-32px); }
        }
        /* Talk badge */
        .av-talk-badge {
            position: absolute; top: 0px; right: -4px;
            font-size: 20px; opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease; z-index: 10;
            filter: drop-shadow(0 0 4px rgba(244,114,182,0.5));
        }
        .av-talk-badge.show { opacity: 1; animation: badgePop 0.3s ease; }
        @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }
        #sleep-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid rgba(244,114,182,0.28);
            box-shadow: 0 0 24px rgba(244,114,182,0.25), 0 0 50px rgba(244,114,182,0.08);
            display: block;
        }
        .msg { max-width: 88%; padding: 12px 16px; border-radius: 9px; font-size: 17px; line-height: 1.65; word-break: break-word; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg-user {
            align-self: flex-end;
            background: rgba(244,114,182,0.1); border: 1px solid rgba(244,114,182,0.22);
            color: #fce7f3; border-bottom-right-radius: 2px;
        }
        .msg-yumin {
            align-self: flex-start;
            background: linear-gradient(135deg,rgba(216,180,254,0.1),rgba(244,114,182,0.05));
            border: 1px solid rgba(216,180,254,0.22); border-left: 3px solid rgba(216,180,254,0.65);
            color: #fce7f3; border-bottom-left-radius: 2px;
            box-shadow: inset 0 0 14px rgba(216,180,254,0.05), 0 0 8px rgba(216,180,254,0.06);
        }
        .msg-label { font-size: 12px; letter-spacing: 1.5px; margin-bottom: 5px; opacity: 0.8; }
        .msg-user .msg-label { color: #f9a8d4; text-align: right; }
        .msg-yumin .msg-label { color: #d8b4fe; }
        .typing-wrap {
            align-self: flex-start; display: flex; gap: 5px; padding: 11px 15px;
            background: rgba(216,180,254,0.07); border: 1px solid rgba(216,180,254,0.18);
            border-radius: 9px; border-bottom-left-radius: 2px;
        }
        .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: #d8b4fe; animation: bounce 1.2s infinite; }
        .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
        .h-divider { position: relative; z-index: 2; height: 1px; background: linear-gradient(to right,transparent,rgba(244,114,182,0.18),transparent); flex-shrink: 0; }

        /* CHAT LIST OVERLAY */
        .chat-list-overlay {
            position: absolute; top: 96px; left: 0; right: 0; bottom: 176px;
            z-index: 15; background: rgba(2,8,20,0.94); backdrop-filter: blur(3px);
            display: none; flex-direction: column; animation: fadeIn 0.2s ease;
            border-top: 1px solid rgba(244,114,182,0.15); border-bottom: 1px solid rgba(244,114,182,0.15);
        }
        .chat-list-overlay.show{display:flex}
        .chat-list-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(244,114,182,0.15); flex-shrink: 0; }
        .chat-list-title { font-size: 16px; letter-spacing: 2px; color: #fbcfe8; }
        .chat-list-close { width: 32px; height: 32px; border: 1px solid rgba(244,114,182,0.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f9a8d4; font-size: 15px; background: transparent; }
        .chat-list-close:hover{background:rgba(244,114,182,0.12)}
        .chat-list-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-list-body::-webkit-scrollbar{width:7px} .chat-list-body::-webkit-scrollbar-thumb{background:rgba(244,114,182,0.55);border-radius:4px}
        .chat-item { padding: 13px 14px; border: 1px solid rgba(244,114,182,0.18); border-radius: 8px; background: rgba(244,114,182,0.04); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover{background:rgba(244,114,182,0.1);border-color:rgba(244,114,182,0.35)}
        .chat-item.active{border-color:rgba(216,180,254,0.4);background:rgba(216,180,254,0.07)}
        .chat-item-info{flex:1;overflow:hidden}
        .chat-item-name{font-size:15px;color:#fbcfe8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-item-preview{font-size:13px;color:rgba(244,114,182,0.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
        .chat-item-actions{display:flex;gap:4px;flex-shrink:0}
        .chat-action-btn{width:26px;height:26px;border:1px solid rgba(244,114,182,0.2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;background:transparent;color:rgba(244,114,182,0.82);transition:all 0.15s}
        .chat-action-btn:hover{background:rgba(244,114,182,0.12);color:#f9a8d4}
        .chat-action-btn.del:hover{background:rgba(239,68,68,0.12);color:#fca5a5;border-color:rgba(239,68,68,0.3)}
        .chat-list-footer{padding:12px;border-top:1px solid rgba(244,114,182,0.12);flex-shrink:0}
        .new-chat-btn{width:100%;padding:12px;background:rgba(244,114,182,0.08);border:1px dashed rgba(244,114,182,0.3);border-radius:8px;color:#f9a8d4;font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
        .new-chat-btn:hover{background:rgba(244,114,182,0.16);border-style:solid}

        /* BOTTOM */
        .bottom-area { position: relative; z-index: 2; padding: 9px 13px 12px; flex-shrink: 0; }
        .pw-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
        .profile-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; animation: float 3s ease-in-out infinite; }
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        .yumin-av-wrap { position: relative; width: 100px; height: 100px; border-radius: 50%; overflow: hidden; filter: drop-shadow(0 0 8px rgba(244,114,182,0.55)); }
        .yumin-av-img { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; opacity: 0; transition: opacity 0.25s ease; transform: scale(1.3); }
        .yumin-av-img.active { opacity: 1; }
        #clock-canvas { width: 100px; height: 100px; border-radius: 50%; position: relative; z-index: 1; filter: drop-shadow(0 0 8px rgba(244,114,182,0.55)); display: none; }
        .profile-ring {
            position: absolute; inset: -4px; border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(244,114,182,0.7); border-right-color: rgba(216,180,254,0.3);
            animation: spin 3s linear infinite;
        }
        .profile-ring-2 {
            position: absolute; inset: -9px; border-radius: 50%;
            border: 1.5px solid transparent;
            border-bottom-color: rgba(216,180,254,0.45); border-left-color: rgba(244,114,182,0.2);
            animation: spin 5s linear infinite reverse;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        #waveform-canvas { flex: 1; min-width: 0; height: 100px; border: 1px solid rgba(244,114,182,0.18); border-radius: 7px; background: rgba(244,114,182,0.02); }
        .chat-sel-btn {
            width: 44px; height: 100px; background: rgba(244,114,182,0.07);
            border: 1px solid rgba(244,114,182,0.22); border-radius: 7px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #f9a8d4; gap: 4px; transition: all 0.2s; flex-shrink: 0;
        }
        .chat-sel-btn:hover{background:rgba(244,114,182,0.15);border-color:rgba(244,114,182,0.45)}
        .chat-sel-btn .icon{font-size:18px} .chat-sel-btn .lbl{font-size:8px;letter-spacing:1px;color:rgba(244,114,182,0.75)}
        .input-row { display: flex; gap: 8px; align-items: center; }
        .chat-input {
            flex: 1; min-width: 0; background: rgba(244,114,182,0.05); border: 1px solid rgba(244,114,182,0.22);
            color: #fce7f3; font-family: 'Courier New',monospace; font-size: 16px;
            padding: 14px 16px; border-radius: 7px; outline: none; transition: border-color 0.2s,box-shadow 0.2s;
        }
        @keyframes inputPulse{0%,100%{box-shadow:0 0 8px rgba(244,114,182,0.1)}50%{box-shadow:0 0 20px rgba(244,114,182,0.32)}}
        .chat-input:focus{border-color:rgba(244,114,182,0.6);animation:inputPulse 1.8s ease-in-out infinite;}
        .chat-input::placeholder{color:rgba(244,114,182,0.52)}
        .send-btn {
            width: 54px; height: 54px;
            background: linear-gradient(135deg,rgba(244,114,182,0.18),rgba(216,180,254,0.12));
            border: 1px solid rgba(244,114,182,0.5); color: #f9a8d4;
            border-radius: 7px; cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center; transition: all 0.25s; flex-shrink: 0;
            box-shadow: 0 0 10px rgba(244,114,182,0.18), inset 0 0 10px rgba(244,114,182,0.05);
        }
        .send-btn:hover:not(:disabled){
            background:linear-gradient(135deg,rgba(244,114,182,0.32),rgba(216,180,254,0.22));
            box-shadow:0 0 22px rgba(244,114,182,0.5),0 0 8px rgba(216,180,254,0.25);
            transform:scale(1.07); border-color:rgba(244,114,182,0.75);
        }
        .send-btn:disabled{opacity:0.35;cursor:not-allowed}
        .scroll-btn {
            position: absolute; bottom: 188px; right: 14px; z-index: 10;
            width: 30px; height: 30px;
            background: rgba(244,114,182,0.15); border: 1px solid rgba(244,114,182,0.5);
            border-radius: 50%; color: #f9a8d4; font-size: 14px;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: 0 0 10px rgba(244,114,182,0.25);
        }
        .scroll-btn.show{display:flex}
        .scroll-btn:hover{background:rgba(244,114,182,0.32);box-shadow:0 0 16px rgba(244,114,182,0.45)}
        .attach-btn {
            width: 54px; height: 54px;
            background: linear-gradient(135deg,rgba(244,114,182,0.1),rgba(216,180,254,0.07));
            border: 1px solid rgba(244,114,182,0.38); color: #f9a8d4;
            border-radius: 7px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center; transition: all 0.25s; flex-shrink: 0;
            box-shadow: 0 0 8px rgba(244,114,182,0.1);
        }
        .attach-btn:hover{background:linear-gradient(135deg,rgba(244,114,182,0.2),rgba(216,180,254,0.14));box-shadow:0 0 16px rgba(244,114,182,0.3);transform:scale(1.05);}
        .attach-btn.has-img{border-color:rgba(216,180,254,0.5);background:rgba(216,180,254,0.1);color:#d8b4fe}
        .img-preview { display: none; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(216,180,254,0.07); border: 1px solid rgba(216,180,254,0.2); border-radius: 7px; margin-bottom: 6px; }
        .img-preview.show{display:flex}
        .img-preview img{width:40px;height:40px;border-radius:5px;object-fit:cover;border:1px solid rgba(216,180,254,0.3)}
        .img-preview-name{font-size:11px;color:rgba(216,180,254,0.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .img-preview-del{cursor:pointer;color:rgba(216,180,254,0.6);font-size:14px;background:none;border:none;padding:2px 4px}
        .msg-error { align-self: flex-start; color: #fca5a5; font-size: 12px; padding: 8px 12px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 7px; animation: fadeIn 0.25s ease; }

        /* ===== EFFECTS ===== */
        :root { --theme-rgb: 244,114,182; }

        /* Yumin message glow */
        .msg-yumin { animation: yuminMsgIn 0.45s ease; }
        @keyframes yuminMsgIn {
            from { opacity:0; transform:translateY(6px); box-shadow:0 0 22px rgba(var(--theme-rgb),0.5); }
            60%  { box-shadow:0 0 12px rgba(var(--theme-rgb),0.25); }
            to   { opacity:1; transform:translateY(0); box-shadow:none; }
        }
        /* Screen edge flash */
        .main-frame.yumin-reply { animation: edgeFlash 0.7s ease; }
        @keyframes edgeFlash {
            0%   { box-shadow:0 0 40px rgba(var(--theme-rgb),0.1),0 0 80px rgba(var(--theme-rgb),0.04),inset 0 0 40px rgba(var(--theme-rgb),0.02); }
            25%  { box-shadow:0 0 75px rgba(var(--theme-rgb),0.65),0 0 150px rgba(var(--theme-rgb),0.28),inset 0 0 60px rgba(var(--theme-rgb),0.08); }
            100% { box-shadow:0 0 40px rgba(var(--theme-rgb),0.1),0 0 80px rgba(var(--theme-rgb),0.04),inset 0 0 40px rgba(var(--theme-rgb),0.02); }
        }
        /* Heartbeat ring */
        .profile-ring.thinking { animation: heartbeat 1s ease-in-out infinite !important; }
        @keyframes heartbeat {
            0%,100% { transform:scale(1); }
            20%     { transform:scale(1.22); filter:drop-shadow(0 0 7px rgba(var(--theme-rgb),0.9)); }
            50%     { transform:scale(1.06); }
        }
    </style>
</head>
<body>
<div class="main-frame">
    <canvas id="bg-canvas"></canvas>
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>

        el.classList.add('glitching');

        const iv=setInterval(()=>{
            el.textContent=scramble();
            el.setAttribute('data-text',orig);

const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
bgCanvas.width = 400; bgCanvas.height = 700;

class Streak {
    constructor(){this.spawn();}
    spawn(){
        this.dir=Math.floor(Math.random()*4);this.speed=0.8+Math.random()*1.5;
        this.len=60+Math.random()*100;this.alpha=0.08+Math.random()*0.15;this.lw=0.5+Math.random()*0.9;
        if(this.dir===0){this.x=-this.len;this.y=Math.random()*700;this.vx=this.speed;this.vy=0;}
        else if(this.dir===1){this.x=Math.random()*400;this.y=-this.len;this.vx=0;this.vy=this.speed;}
        else if(this.dir===2){this.x=-this.len;this.y=Math.random()*420;this.vx=this.speed;this.vy=this.speed*0.45;}
        else{this.x=-this.len;this.y=280+Math.random()*420;this.vx=this.speed;this.vy=-this.speed*0.45;}
    }
    isOff(){return this.x>500||this.y>800||this.y<-200;}
    update(){this.x+=this.vx;this.y+=this.vy;}
    draw(ctx){
        const st=this.len/this.speed,tx=this.x-this.vx*st,ty=this.y-this.vy*st;
        const g=ctx.createLinearGradient(tx,ty,this.x,this.y);
        g.addColorStop(0,'rgba(244,114,182,0)');
        g.addColorStop(0.6,`rgba(249,168,212,${this.alpha*0.5})`);
        g.addColorStop(1,`rgba(251,207,232,${this.alpha})`);
        ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(this.x,this.y);
        ctx.strokeStyle=g;ctx.lineWidth=this.lw;
        ctx.shadowColor='rgba(244,114,182,0.6)';ctx.shadowBlur=6;ctx.stroke();ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(this.x,this.y,this.lw*1.8,0,Math.PI*2);
        ctx.fillStyle=`rgba(251,207,232,${this.alpha})`;ctx.fill();
    }
}
class Orb {
    constructor(){
        this.x=40+Math.random()*320;this.y=70+Math.random()*560;
        this.vx=(Math.random()-0.5)*0.6;this.vy=(Math.random()-0.5)*0.6;
        this.r=25+Math.random()*35;this.phase=Math.random()*Math.PI*2;
        this.ps=0.018+Math.random()*0.022;this.alpha=0.1+Math.random()*0.14;
    }
    update(){
        this.x+=this.vx;this.y+=this.vy;this.phase+=this.ps;
        if(this.x<0||this.x>400)this.vx*=-1;if(this.y<0||this.y>700)this.vy*=-1;
    }
    draw(ctx){
        const r=this.r*(1+Math.sin(this.phase)*0.28);
        const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
        g.addColorStop(0,`rgba(249,168,212,${this.alpha*0.9})`);
        g.addColorStop(0.35,`rgba(244,114,182,${this.alpha*0.5})`);
        g.addColorStop(1,'rgba(244,114,182,0)');
        ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
}
const streaks=Array.from({length:14},()=>new Streak());
const orbs=Array.from({length:6},()=>new Orb());
function drawBg(){
    bgCtx.fillStyle='rgba(2,8,20,0.18)';bgCtx.fillRect(0,0,400,700);
    for(let i=0;i<orbs.length;i++)for(let j=i+1;j<orbs.length;j++){
        const dx=orbs[i].x-orbs[j].x,dy=orbs[i].y-orbs[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<200){bgCtx.beginPath();bgCtx.moveTo(orbs[i].x,orbs[i].y);bgCtx.lineTo(orbs[j].x,orbs[j].y);bgCtx.strokeStyle=`rgba(244,114,182,${(1-d/200)*0.1})`;bgCtx.lineWidth=0.6;bgCtx.stroke();}
    }
    orbs.forEach(o=>{o.update();o.draw(bgCtx);});
    streaks.forEach((s,i)=>{s.update();s.draw(bgCtx);if(s.isOff())streaks[i]=new Streak();});
    requestAnimationFrame(drawBg);
}
drawBg();

    ctx.beginPath();ctx.arc(cx+2,cy-1,0.7,0,Math.PI*2);ctx.fillStyle='#FFFFFF';ctx.fill();
}

    const m=String(now.getMinutes()).padStart(2,'0');
    ctx.textAlign='center';
    ctx.font='bold 20px Courier New';
    ctx.fillStyle='#fbcfe8';
    ctx.shadowColor='rgba(244,114,182,0.9)';ctx.shadowBlur=12;
    ctx.fillText(`${String(h).padStart(2,'0')}:${m}`,50,51);
    ctx.shadowBlur=0;
    ctx.font='9px Courier New';
    ctx.fillStyle='rgba(244,114,182,0.75)';
    ctx.fillText(ampm,50,66);
}

let sleepX=0,sleepY=0,sleepVX=1.4,sleepVY=1.1;
const SLEEP_SIZE=130;

function activatePreSleep(){
    preSleepMode=true;
    document.querySelectorAll('.yumin-av-img').forEach(img=>img.classList.remove('active'));
    document.getElementById('av-blink')?.classList.add('active');
    avatarState='presleep';
    document.getElementById('av-zzz-wrap').classList.add('show');
    document.getElementById('av-talk-badge').classList.remove('show');
}
function activateSleep(){
    preSleepMode=false;
    sleepMode=true;
    document.getElementById('av-zzz-wrap').classList.remove('show');
    const overlay=document.getElementById('sleep-overlay');
    overlay.classList.add('show');
    document.getElementById('yumin-av-wrap').style.display='none';
    clockCanvas.style.display='block';
    const ow=overlay.clientWidth||370;
    const oh=overlay.clientHeight||320;
    sleepX=Math.random()*(ow-SLEEP_SIZE);
    sleepY=Math.random()*(oh-SLEEP_SIZE);
    sleepVX=(Math.random()>0.5?1:-1)*(0.5+Math.random()*0.25);
    sleepVY=(Math.random()>0.5?1:-1)*(0.45+Math.random()*0.2);
}
function wakeUp(){
    if(!sleepMode&&!preSleepMode)return;
    sleepMode=false;
    preSleepMode=false;
    document.getElementById('av-zzz-wrap').classList.remove('show');
    document.getElementById('sleep-overlay').classList.remove('show');
    document.getElementById('yumin-av-wrap').style.display='';
    clockCanvas.style.display='none';
    setAvatarState('normal');
    resetSleepTimer();
}
function resetSleepTimer(){
    if(preSleepTimer)clearTimeout(preSleepTimer);
    if(sleepTimer)clearTimeout(sleepTimer);
    preSleepTimer=setTimeout(activatePreSleep,PRE_SLEEP_TIMEOUT);
    sleepTimer=setTimeout(activateSleep,SLEEP_TIMEOUT);
}

function clockLoop(){
    requestAnimationFrame(clockLoop);
    if(sleepMode) drawClock();
}
clockLoop();

function sleepBounceLoop(){
    requestAnimationFrame(sleepBounceLoop);
    if(!sleepMode)return;
    const overlay=document.getElementById('sleep-overlay');
    const ow=overlay.clientWidth||370;
    const oh=overlay.clientHeight||320;
    sleepX+=sleepVX;
    sleepY+=sleepVY;
    const nudge=()=>(Math.random()-0.5)*0.15;
    if(sleepX<=0){sleepX=0;sleepVX=Math.abs(sleepVX)+nudge();}
    if(sleepX>=ow-SLEEP_SIZE){sleepX=ow-SLEEP_SIZE;sleepVX=-(Math.abs(sleepVX)+nudge());}
    if(sleepY<=0){sleepY=0;sleepVY=Math.abs(sleepVY)+nudge();}
    if(sleepY>=oh-SLEEP_SIZE){sleepY=oh-SLEEP_SIZE;sleepVY=-(Math.abs(sleepVY)+nudge());}
    document.getElementById('sleep-yumin-wrap').style.transform=`translate(${sleepX}px,${sleepY}px)`;
}
sleepBounceLoop();

function resetIdleTimer(){
    if(sleepMode||preSleepMode){wakeUp();return;}
    resetSleepTimer();
}
document.addEventListener('click',resetIdleTimer);
document.addEventListener('keydown',resetIdleTimer);
document.addEventListener('touchstart',resetIdleTimer);
resetIdleTimer();

// ====== WAVEFORM ======
const wfCanvas=document.getElementById('waveform-canvas');
const wfCtx=wfCanvas.getContext('2d');
let isAiSpeaking=false,wfPhase=0;
let wfColor='244,114,182'; // อัพเดทตาม theme
function resizeWf(){wfCanvas.width=wfCanvas.offsetWidth||300;wfCanvas.height=wfCanvas.offsetHeight||60;}
setTimeout(resizeWf,80);
function drawWaveform(){
    requestAnimationFrame(drawWaveform);
    const w=wfCanvas.width,h=wfCanvas.height;
    wfPhase+=isAiSpeaking?0.08:0.025;
    wfCtx.clearRect(0,0,w,h);
    const layers=[
        {amp:isAiSpeaking?14+Math.random()*10:3.5, freq:0.022, phOff:0,   lw:2,   alpha:isAiSpeaking?0.75:0.35},
        {amp:isAiSpeaking?9+Math.random()*7:2,     freq:0.036, phOff:1.2, lw:1.5, alpha:isAiSpeaking?0.45:0.18},
        {amp:isAiSpeaking?5+Math.random()*5:1.2,   freq:0.055, phOff:2.5, lw:1,   alpha:isAiSpeaking?0.22:0.09},
    ];
    layers.forEach(l=>{
        // gradient fill under curve
        wfCtx.beginPath();
        for(let x=0;x<=w;x++){
            const y=h/2+Math.sin(x*l.freq+wfPhase+l.phOff)*l.amp;
            x===0?wfCtx.moveTo(x,y):wfCtx.lineTo(x,y);
        }
        wfCtx.lineTo(w,h/2);wfCtx.lineTo(0,h/2);wfCtx.closePath();
        const fg=wfCtx.createLinearGradient(0,h/2-l.amp*2,0,h/2);
        fg.addColorStop(0,`rgba(${wfColor},${l.alpha*0.35})`);
        fg.addColorStop(1,`rgba(${wfColor},0)`);
        wfCtx.fillStyle=fg;wfCtx.fill();
        // stroke on top
        wfCtx.beginPath();
        for(let x=0;x<=w;x++){
            const y=h/2+Math.sin(x*l.freq+wfPhase+l.phOff)*l.amp;
            x===0?wfCtx.moveTo(x,y):wfCtx.lineTo(x,y);
        }
        wfCtx.strokeStyle=`rgba(${wfColor},${l.alpha})`;
        wfCtx.lineWidth=l.lw;
        wfCtx.shadowColor=`rgba(${wfColor},0.6)`;
        wfCtx.shadowBlur=isAiSpeaking?10:3;
        wfCtx.stroke();
        wfCtx.shadowBlur=0;
    });
}
drawWaveform();

// ====== CHAT ======
const chatArea=document.getElementById('chat-area');
const chatInput=document.getElementById('chat-input');
const sendBtn=document.getElementById('send-btn');
const statusTxt=document.getElementById('status-text');
let history=[];

function addMsg(role,html){
    const div=document.createElement('div');
    div.className=`msg msg-${role}`;
    const label=role==='user'?'อ้ายโดม':'YUMIN';
    div.innerHTML=`<div class="msg-label">${label}</div>${html}`;
    chatArea.appendChild(div);
    chatArea.scrollTop=chatArea.scrollHeight;
    if(role==='yumin'){
        const frame=document.querySelector('.main-frame');
        frame.classList.add('yumin-reply');
        setTimeout(()=>frame.classList.remove('yumin-reply'),700);
    }
}
function addError(msg){
    const div=document.createElement('div');div.className='msg-error';div.textContent='⚠ '+msg;
    chatArea.appendChild(div);chatArea.scrollTop=chatArea.scrollHeight;
}
function showTyping(){
    const div=document.createElement('div');div.className='typing-wrap';div.id='typing';
    div.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chatArea.appendChild(div);chatArea.scrollTop=chatArea.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function setStatus(txt,online=true){
    statusTxt.textContent=txt;
    const dot=document.querySelector('.status-dot');
    dot.style.background=online?'#f472b6':'#f59e0b';
    dot.style.boxShadow=online?'0 0 7px #f472b6':'0 0 7px #f59e0b';
}

async function sendMessage(){
    const text=chatInput.value.trim();
    if(!text||sendBtn.disabled)return;
    chatInput.value='';sendBtn.disabled=true;

    const imgHtml=attachedImage
        ?`<img src="data:${attachedImage.mimeType};base64,${attachedImage.base64}" style="max-width:100%;border-radius:6px;margin-bottom:6px;display:block;border:1px solid rgba(244,114,182,0.2)"><br>`:'';
    addMsg('user',imgHtml+text);

    let content;
    if(attachedImage){
        content=[
            {type:'image',source:{type:'base64',media_type:attachedImage.mimeType,data:attachedImage.base64}},
            {type:'text',text}
        ];
    } else { content=text; }
    history.push({role:'user',content});
    clearImage();

    showTyping();isAiSpeaking=true;
    setAvatarState('happy');
    setTimeout(()=>{if(avatarState==='happy')setAvatarState('normal');},2500);
    document.querySelector('.profile-ring')?.classList.add('thinking');
    setStatus('YUMIN กำลังคิดอยู่เน้อ...♥',false);

    try{
        const res=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',
            headers:{
                'content-type':'application/json',
                'x-api-key':API_KEY,
                'anthropic-version':'2023-06-01',
                'anthropic-dangerous-direct-browser-access':'true'
            },
            body:JSON.stringify({
                model:CLAUDE_MODEL,
                max_tokens:1024,
                system:SYSTEM_PROMPT,
                messages:history
            })
        });
        if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`HTTP ${res.status}`);}
        const data=await res.json();
        const reply=data.content?.[0]?.text??'ยูมินตอบไม่ได้ในตอนนี้เน้อ...';
        history.push({role:'assistant',content:reply});
        removeTyping();
        addMsg('yumin',reply.replace(/\n/g,'<br>'));
    } catch(err){
        history.pop();
        removeTyping();
        addError('ระบบขัดข้องเน้อ อ้ายโดม: '+err.message);
        setAvatarState('sad');
        setTimeout(()=>setAvatarState('normal'),3000);
    }
    isAiSpeaking=false;
    document.querySelector('.profile-ring')?.classList.remove('thinking');
    setStatus('YUMIN ONLINE — พร้อมคุยแล้วเน้อ ♥',true);
    sendBtn.disabled=false;chatInput.focus();
    saveChatsToStorage();
}

// ====== IMAGE ATTACH ======
let attachedImage=null;
function compressImage(file, callback){
    const reader=new FileReader();
    reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
            const MAX=1600, canvas=document.createElement('canvas');
            let w=img.width, h=img.height;
            if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            const quality=0.82;
            const dataUrl=canvas.toDataURL('image/jpeg',quality);
            callback(dataUrl.split(',')[1],'image/jpeg',file.name);
        };
        img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
}
document.getElementById('file-input').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    compressImage(file,(base64,mimeType,name)=>{
        attachedImage={base64,mimeType,name};
        document.getElementById('img-thumb').src='data:'+mimeType+';base64,'+base64;
        document.getElementById('img-name').textContent=name;
        document.getElementById('img-preview').classList.add('show');
        document.getElementById('attach-btn').classList.add('has-img');
    });
    e.target.value='';
});
function clearImage(){
    attachedImage=null;
    document.getElementById('img-preview').classList.remove('show');
    document.getElementById('attach-btn').classList.remove('has-img');
    document.getElementById('img-thumb').src='';
}

// ====== MULTI-CHAT ======
let chats=JSON.parse(localStorage.getItem('yumin_chats')||'null')||[{id:1,name:'แชท 1',history:[],html:''}];
let activeChatId=parseInt(localStorage.getItem('yumin_active_chat')||'1');

function saveChatsToStorage(){
    const cur=chats.find(c=>c.id===activeChatId);
    if(cur){cur.html=chatArea.innerHTML;cur.history=history;}
    try{localStorage.setItem('yumin_chats',JSON.stringify(chats));localStorage.setItem('yumin_active_chat',activeChatId);}catch(e){}
}
function loadChat(id){
    const cur=chats.find(c=>c.id===activeChatId);
    if(cur){cur.html=chatArea.innerHTML;cur.history=history;}
    activeChatId=id;
    const target=chats.find(c=>c.id===id);if(!target)return;
    chatArea.innerHTML=target.html||`<div class="msg msg-yumin"><div class="msg-label">YUMIN</div>อ้ายโดม~ ยูมินออนไลน์แล้วเน้อ 💕✨<br>วันนี้จะให้ยูมินช่วยอะหยังเจ้า?</div>`;
    history=target.history||[];
    localStorage.setItem('yumin_active_chat',activeChatId);
    renderChatList();
}
function createNewChat(){
    const newId=Date.now(),newName=`แชท ${chats.length+1}`;
    chats.push({id:newId,name:newName,history:[],html:''});
    saveChatsToStorage();loadChat(newId);
}
function deleteChat(id,e){
    e.stopPropagation();if(chats.length===1)return;
    chats=chats.filter(c=>c.id!==id);saveChatsToStorage();
    if(activeChatId===id)loadChat(chats[0].id);else renderChatList();
}
function renameChat(id,e){
    e.stopPropagation();const chat=chats.find(c=>c.id===id);if(!chat)return;
    const newName=prompt('ตั้งชื่อแชทใหม่:',chat.name);
    if(newName&&newName.trim()){chat.name=newName.trim();saveChatsToStorage();renderChatList();}
}
function renderChatList(){
    const overlay=document.getElementById('chat-list-overlay');
    const listHtml=chats.map(c=>{
        const preview=c.history.length>0?(c.history[c.history.length-1]?.content||'').toString().slice(0,40)+'...':'ยังไม่มีข้อความ';
        return `<div class="chat-item${c.id===activeChatId?' active':''}" onclick="loadChat(${c.id});toggleChatList()">
            <div class="chat-item-info"><div class="chat-item-name">${c.name}</div><div class="chat-item-preview">${preview}</div></div>
            <div class="chat-item-actions">
                <button class="chat-action-btn" onclick="renameChat(${c.id},event)">✏</button>
                <button class="chat-action-btn del" onclick="deleteChat(${c.id},event)">🗑</button>
            </div></div>`;
    }).join('');
    overlay.innerHTML=`
        <div class="chat-list-header"><span class="chat-list-title">💬 CHATS</span><button class="chat-list-close" onclick="toggleChatList()">✕</button></div>
        <div class="chat-list-body">${listHtml}</div>
        <div class="chat-list-footer"><button class="new-chat-btn" onclick="createNewChat();toggleChatList()">＋ แชทใหม่</button></div>`;
}
function toggleChatList(){
    const overlay=document.getElementById('chat-list-overlay');
    if(overlay.classList.contains('show')){overlay.classList.remove('show');}
    else{renderChatList();overlay.classList.add('show');}
}
(function initChats(){
    const saved=JSON.parse(localStorage.getItem('yumin_chats')||'null');
    if(saved)chats=saved;
    const savedActive=parseInt(localStorage.getItem('yumin_active_chat')||'0');
    const target=chats.find(c=>c.id===savedActive)||chats[0];
    if(target.html){chatArea.innerHTML=target.html;history=target.history||[];activeChatId=target.id;}
})();

function goToTools(){
    try{saveChatsToStorage();}catch(e){}
    window.location.href='yumin_tools_v1.html';
}

sendBtn.addEventListener('click',sendMessage);
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
chatArea.addEventListener('scroll',()=>{
    const btn=document.getElementById('scroll-btn');
    const isBottom=chatArea.scrollHeight-chatArea.scrollTop-chatArea.clientHeight<60;

});
